name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # Building the app (and thus the tests) needs the macOS 26 SDK for the
      # Liquid Glass `glassEffect` symbols — pin the newest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: swift test
